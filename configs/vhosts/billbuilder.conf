<VirtualHost *:80>
    ServerName app.billbuilder.local
    
    RewriteEngine On
    ProxyPreserveHost On
    
    # WebSocket support
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:3000/$1 [P,L]
    
    # Proxy settings
    ProxyPass / http://localhost:3000/
    ProxyPassReverse / http://127.0.0.1:3000/
       
    # Logging
    ErrorLog /var/log/apache2/error.ui.local.log
    CustomLog /var/log/apache2/access.ui.local.log combined
</VirtualHost>