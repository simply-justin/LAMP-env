<VirtualHost *:80>
  ServerName iam.billbuilder.local
  DocumentRoot /var/www/billbuilder/billbuilder-iam
  
	<Directory /var/www/billbuilder/billbuilder-iam>
	  Options FollowSymLinks
	  AllowOverride All
	  Require all granted
	</Directory>
  
  ErrorLog /var/log/apache2/error.iam.local.log
  CustomLog /var/log/apache2/error.iam.local.log combined
</VirtualHost>

<VirtualHost *:80>
  ServerName app.billbuilder.local
  DocumentRoot /var/www/billbuilder/billbuilder-ui
  
  ProxyPreserveHost On
  ProxyRequests Off

  <Proxy *>
    Require all granted
  </Proxy>

	RewriteEngine on
	RewriteCond %{HTTP:Upgrade} =websocket [NC]
	RewriteRule /(.*) ws://127.0.0.1:3000/$1 [P,L]

	ProxyPass / http://127.0.0.1:3000/
	ProxyPassReverse / http://127.0.0.1:3000/
  
  ErrorLog /var/log/apache2/error.ui.local.log
  CustomLog /var/log/apache2/error.ui.local.log combined
</VirtualHost>

<VirtualHost *:80>
  ServerName api.billbuilder.local
  DocumentRoot /var/www/billbuilder/billbuilder-api
  
	<Directory /var/www/billbuilder/billbuilder-api>
	  Options FollowSymLinks
	  AllowOverride All
	  Require all granted
	</Directory>
  
  ErrorLog /var/log/apache2/error.api.local.log
  CustomLog /var/log/apache2/error.api.local.log combined
</VirtualHost>