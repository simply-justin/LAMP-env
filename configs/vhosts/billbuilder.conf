<VirtualHost *:80>
    ServerName app.billbuilder.local

    ProxyPreserveHost On
    ProxyRequests Off

    # WebSocket ondersteuning voor hot reload
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} =websocket [NC]
    RewriteRule /(.*) ws://localhost:3000/$1 [P,L]
    RewriteCond %{HTTP:Upgrade} !=websocket [NC]
    RewriteRule /(.*) http://localhost:3000/$1 [P,L]

    ProxyPassReverse / http://localhost:3000/

    # Logging
    ErrorLog /var/log/apache2/error.ui.local.log
    CustomLog /var/log/apache2/access.ui.local.log combined
</VirtualHost>